apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: trino-coordinator-default
  annotations:
    restarter.stackable.tech/ignore-secret.0: trino-users
  labels:
    app.kubernetes.io/component: coordinator
    app.kubernetes.io/instance: trino
    app.kubernetes.io/managed-by: trino.stackable.tech_trinocluster
    app.kubernetes.io/name: trino
    app.kubernetes.io/role-group: default
    restarter.stackable.tech/enabled: "true"
    stackable.tech/vendor: Stackable
  ownerReferences:
    - apiVersion: trino.stackable.tech/v1alpha1
      controller: true
      kind: TrinoCluster
      name: trino
spec:
  podManagementPolicy: Parallel
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: coordinator
      app.kubernetes.io/instance: trino
      app.kubernetes.io/name: trino
      app.kubernetes.io/role-group: default
  serviceName: trino-coordinator-default-headless
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: trino
      labels:
        app.kubernetes.io/component: coordinator
        app.kubernetes.io/instance: trino
        app.kubernetes.io/managed-by: trino.stackable.tech_trinocluster
        app.kubernetes.io/name: trino
        app.kubernetes.io/role-group: default
        stackable.tech/vendor: Stackable
    spec:
      serviceAccount: trino-serviceaccount
      serviceAccountName: trino-serviceaccount
      terminationGracePeriodSeconds: 900
status:
  readyReplicas: 1
  replicas: 1
---
