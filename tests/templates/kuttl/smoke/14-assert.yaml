---
# Snapshot the full `.data` of each operator-managed ConfigMap.
# Any code change that alters rendered config values will fail these diffs.
#
# Runs as its own step (after 10/11/12) so kuttl does not re-evaluate the heavy
# heredocs on every 1-second readiness retry of the install step. By this point
# the cluster is in steady state, so each script runs once.
#
# The heredoc is quoted (`<<'YAMLEOF'`) so shell substitution is disabled and
# Java-properties escapes like `${ENV\:VAR}` survive verbatim. Only `__NAMESPACE__`
# is substituted afterwards via `sed`, because kuttl tests run in a randomized
# namespace per invocation. Both sides are normalized to canonical JSON via
# `yq -o=json`; keys are already alphabetical on both sides (operator stores
# BTreeMap; kubectl serializes maps sorted; the heredoc is hand-sorted).
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 60
commands:
  # Verify the operator-managed secrets contain the expected data keys.
  # Values are random per install and are not asserted.
  - script: kubectl -n $NAMESPACE get secret trino-internal-secret -o yaml | yq -e '.data | has("INTERNAL_SECRET")'
  - script: kubectl -n $NAMESPACE get secret trino-spooling-secret -o yaml | yq -e '.data | has("SPOOLING_SECRET")'
  - script: |
      expected=$(cat <<'YAMLEOF' | sed "s|__NAMESPACE__|$NAMESPACE|g" | yq -o=json
      access-control.properties: |
        access-control.name=opa
        opa.allow-permission-management-operations=true
        opa.policy.batch-column-masking-uri=http\://opa-server.__NAMESPACE__.svc.cluster.local\:8081/v1/data/trino/batchColumnMasks
        opa.policy.batched-uri=http\://opa-server.__NAMESPACE__.svc.cluster.local\:8081/v1/data/trino/batch
        opa.policy.row-filters-uri=http\://opa-server.__NAMESPACE__.svc.cluster.local\:8081/v1/data/trino/rowFilters
        opa.policy.uri=http\://opa-server.__NAMESPACE__.svc.cluster.local\:8081/v1/data/trino/allow
      config.properties: |
        coordinator=true
        discovery.uri=https\://trino-coordinator-default-0.trino-coordinator-default-headless.__NAMESPACE__.svc.cluster.local\:8443
        http-server.authentication.type=PASSWORD
        http-server.https.enabled=true
        http-server.https.keystore.key=changeit
        http-server.https.keystore.path=/stackable/server_tls/keystore.p12
        http-server.https.port=8443
        http-server.https.truststore.key=changeit
        http-server.https.truststore.path=/stackable/server_tls/truststore.p12
        http-server.log.enabled=false
        internal-communication.https.keystore.key=changeit
        internal-communication.https.keystore.path=/stackable/internal_tls/keystore.p12
        internal-communication.https.truststore.key=changeit
        internal-communication.https.truststore.path=/stackable/internal_tls/truststore.p12
        internal-communication.shared-secret=${ENV\:INTERNAL_SECRET}
        log.compression=none
        log.format=json
        log.max-size=5MB
        log.max-total-size=10MB
        log.path=/stackable/log/trino/server.airlift.json
        node-scheduler.include-coordinator=false
        node.internal-address-source=FQDN
        password-authenticator.config-files=/stackable/rwconfig/trino-users-auth-password-file-auth.properties
        query.max-execution-time=5s
        query.max-memory=50GB
      jvm.config: |-
        -server
        # Heap settings
        -Xms3276m
        -Xmx3276m
        # Specify security.properties
        -Djava.security.properties=/stackable/rwconfig/security.properties
        # Prometheus metrics exporter
        -javaagent:/stackable/jmx/jmx_prometheus_javaagent.jar=8081:/stackable/jmx/config.yaml
        # Truststore settings
        -Djavax.net.ssl.trustStore=/stackable/client_tls/truststore.p12
        -Djavax.net.ssl.trustStoreType=pkcs12
        -Djavax.net.ssl.trustStorePassword=changeit
        # Recommended JVM arguments from Trino
        -XX:InitialRAMPercentage=80
        -XX:MaxRAMPercentage=80
        -XX:G1HeapRegionSize=32M
        -XX:+ExplicitGCInvokesConcurrent
        -XX:+ExitOnOutOfMemoryError
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:-OmitStackTraceInFastThrow
        -XX:ReservedCodeCacheSize=512M
        -XX:PerMethodRecompilationCutoff=10000
        -XX:PerBytecodeRecompilationCutoff=10000
        -Djdk.attach.allowAttachSelf=true
        -Djdk.nio.maxCachedBufferSize=2000000
        -Dfile.encoding=UTF-8
        -XX:+EnableDynamicAgentLoading
        # Arguments from jvmArgumentOverrides
      log.properties: |
        =info
      node.properties: |
        node.environment=trino
      security.properties: |
        networkaddress.cache.negative.ttl=0
        networkaddress.cache.ttl=30
      trino-users-auth-password-file-auth.properties: |
        file.password-file=/stackable/users/trino-users-auth.db
        password-authenticator.name=file
      YAMLEOF
      )
      actual=$(kubectl -n $NAMESPACE get cm trino-coordinator-default -o yaml | yq -o=json '.data')
      if [ "$expected" != "$actual" ]; then
        echo "ERROR: ConfigMap trino-coordinator-default data drifted from snapshot."
        echo "=== expected ==="
        printf '%s\n' "$expected"
        echo "=== actual ==="
        printf '%s\n' "$actual"
        exit 1
      fi
  - script: |
      expected=$(cat <<'YAMLEOF' | sed "s|__NAMESPACE__|$NAMESPACE|g" | yq -o=json
      access-control.properties: |
        access-control.name=opa
        opa.allow-permission-management-operations=true
        opa.policy.batch-column-masking-uri=http\://opa-server.__NAMESPACE__.svc.cluster.local\:8081/v1/data/trino/batchColumnMasks
        opa.policy.batched-uri=http\://opa-server.__NAMESPACE__.svc.cluster.local\:8081/v1/data/trino/batch
        opa.policy.row-filters-uri=http\://opa-server.__NAMESPACE__.svc.cluster.local\:8081/v1/data/trino/rowFilters
        opa.policy.uri=http\://opa-server.__NAMESPACE__.svc.cluster.local\:8081/v1/data/trino/allow
      config.properties: |
        coordinator=false
        discovery.uri=https\://trino-coordinator-default-0.trino-coordinator-default-headless.__NAMESPACE__.svc.cluster.local\:8443
        http-server.https.enabled=true
        http-server.https.keystore.key=changeit
        http-server.https.keystore.path=/stackable/server_tls/keystore.p12
        http-server.https.port=8443
        http-server.https.truststore.key=changeit
        http-server.https.truststore.path=/stackable/server_tls/truststore.p12
        http-server.log.enabled=false
        internal-communication.https.keystore.key=changeit
        internal-communication.https.keystore.path=/stackable/internal_tls/keystore.p12
        internal-communication.https.truststore.key=changeit
        internal-communication.https.truststore.path=/stackable/internal_tls/truststore.p12
        internal-communication.shared-secret=${ENV\:INTERNAL_SECRET}
        log.compression=none
        log.format=json
        log.max-size=5MB
        log.max-total-size=10MB
        log.path=/stackable/log/trino/server.airlift.json
        node.internal-address-source=FQDN
        query.max-memory=50GB
        shutdown.grace-period=30s
      jvm.config: |-
        -server
        # Heap settings
        -Xms3276m
        -Xmx3276m
        # Specify security.properties
        -Djava.security.properties=/stackable/rwconfig/security.properties
        # Prometheus metrics exporter
        -javaagent:/stackable/jmx/jmx_prometheus_javaagent.jar=8081:/stackable/jmx/config.yaml
        # Truststore settings
        -Djavax.net.ssl.trustStore=/stackable/client_tls/truststore.p12
        -Djavax.net.ssl.trustStoreType=pkcs12
        -Djavax.net.ssl.trustStorePassword=changeit
        # Recommended JVM arguments from Trino
        -XX:InitialRAMPercentage=80
        -XX:MaxRAMPercentage=80
        -XX:G1HeapRegionSize=32M
        -XX:+ExplicitGCInvokesConcurrent
        -XX:+ExitOnOutOfMemoryError
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:-OmitStackTraceInFastThrow
        -XX:ReservedCodeCacheSize=512M
        -XX:PerMethodRecompilationCutoff=10000
        -XX:PerBytecodeRecompilationCutoff=10000
        -Djdk.attach.allowAttachSelf=true
        -Djdk.nio.maxCachedBufferSize=2000000
        -Dfile.encoding=UTF-8
        -XX:+EnableDynamicAgentLoading
        # Arguments from jvmArgumentOverrides
      log.properties: |
        =info
      node.properties: |
        node.environment=trino
      security.properties: |
        networkaddress.cache.negative.ttl=0
        networkaddress.cache.ttl=30
      YAMLEOF
      )
      actual=$(kubectl -n $NAMESPACE get cm trino-worker-default -o yaml | yq -o=json '.data')
      if [ "$expected" != "$actual" ]; then
        echo "ERROR: ConfigMap trino-worker-default data drifted from snapshot."
        echo "=== expected ==="
        printf '%s\n' "$expected"
        echo "=== actual ==="
        printf '%s\n' "$actual"
        exit 1
      fi
  - script: |
      expected=$(cat <<'YAMLEOF' | sed "s|__NAMESPACE__|$NAMESPACE|g" | yq -o=json
      hive.properties: |
        connector.name=hive
        fs.hadoop.enabled=true
        fs.native-s3.enabled=true
        hive.config.resources=/stackable/config/catalog/hive/hdfs-config/core-site.xml,/stackable/config/catalog/hive/hdfs-config/hdfs-site.xml
        hive.metastore.uri=thrift\://hive-metastore.__NAMESPACE__.svc.cluster.local\:9083
        hive.security=allow-all
        s3.aws-access-key=${ENV\:CATALOG_HIVE_S3_AWS_ACCESS_KEY}
        s3.aws-secret-key=${ENV\:CATALOG_HIVE_S3_AWS_SECRET_KEY}
        s3.endpoint=https\://minio\:9000/
        s3.path-style-access=true
        s3.region=us-east-1
      iceberg.properties: |
        connector.name=iceberg
        fs.hadoop.enabled=true
        fs.native-s3.enabled=true
        hive.config.resources=/stackable/config/catalog/iceberg/hdfs-config/core-site.xml,/stackable/config/catalog/iceberg/hdfs-config/hdfs-site.xml
        hive.metastore.uri=thrift\://hive-metastore.__NAMESPACE__.svc.cluster.local\:9083
        iceberg.security=allow-all
        s3.aws-access-key=${ENV\:CATALOG_ICEBERG_S3_AWS_ACCESS_KEY}
        s3.aws-secret-key=${ENV\:CATALOG_ICEBERG_S3_AWS_SECRET_KEY}
        s3.endpoint=https\://minio\:9000/
        s3.path-style-access=true
        s3.region=us-east-1
      postgresql.properties: |
        connection-password=${ENV\:POSTGRESQL_POSTGRESQL_DATABASE_PASSWORD}
        connection-url=jdbc\:postgresql\://postgresql\:5432/hive
        connection-user=${ENV\:POSTGRESQL_POSTGRESQL_DATABASE_USERNAME}
        connector.name=postgresql
      postgresqlgeneric.properties: |
        connection-password=${ENV\:CATALOG_POSTGRESQLGENERIC_CONNECTION_PASSWORD}
        connection-url=jdbc\:postgresql\://postgresql\:5432/hive
        connection-user=${ENV\:CATALOG_POSTGRESQLGENERIC_CONNECTION_USER}
        connector.name=postgresql
      tpch.properties: |
        connector.name=tpch
      YAMLEOF
      )
      actual=$(kubectl -n $NAMESPACE get cm trino-coordinator-default-catalog -o yaml | yq -o=json '.data')
      if [ "$expected" != "$actual" ]; then
        echo "ERROR: ConfigMap trino-coordinator-default-catalog data drifted from snapshot."
        echo "=== expected ==="
        printf '%s\n' "$expected"
        echo "=== actual ==="
        printf '%s\n' "$actual"
        exit 1
      fi
  - script: |
      expected=$(cat <<'YAMLEOF' | sed "s|__NAMESPACE__|$NAMESPACE|g" | yq -o=json
      hive.properties: |
        connector.name=hive
        fs.hadoop.enabled=true
