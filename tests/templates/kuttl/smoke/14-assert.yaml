        connector.name=postgresql
      tpch.properties: |
        connector.name=tpch
      YAMLEOF
      )
      actual=$(kubectl -n $NAMESPACE get cm trino-worker-default-catalog -o yaml | yq -o=json '.data')
      if [ "$expected" != "$actual" ]; then
