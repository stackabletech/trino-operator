        hive.config.resources=/stackable/config/catalog/iceberg/hdfs-config/core-site.xml,/stackable/config/catalog/iceberg/hdfs-config/hdfs-site.xml
        hive.metastore.uri=thrift\://hive-metastore.__NAMESPACE__.svc.cluster.local\:9083
        iceberg.security=allow-all
        s3.aws-access-key=${ENV\:CATALOG_ICEBERG_S3_AWS_ACCESS_KEY}
        s3.aws-secret-key=${ENV\:CATALOG_ICEBERG_S3_AWS_SECRET_KEY}
        s3.endpoint=https\://minio\:9000/
        s3.path-style-access=true
        s3.region=us-east-1
      postgresql.properties: |
        connection-password=${ENV\:POSTGRESQL_POSTGRESQL_DATABASE_PASSWORD}
        connection-url=jdbc\:postgresql\://postgresql\:5432/hive
        connection-user=${ENV\:POSTGRESQL_POSTGRESQL_DATABASE_USERNAME}
        connector.name=postgresql
