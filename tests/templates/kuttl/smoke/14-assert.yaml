        hive.config.resources=/stackable/config/catalog/hive/hdfs-config/core-site.xml,/stackable/config/catalog/hive/hdfs-config/hdfs-site.xml
        hive.metastore.uri=thrift\://hive-metastore.__NAMESPACE__.svc.cluster.local\:9083
        hive.security=allow-all
        s3.aws-access-key=${ENV\:CATALOG_HIVE_S3_AWS_ACCESS_KEY}
